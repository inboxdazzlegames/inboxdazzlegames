<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Dazzle Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Exo 2', sans-serif;
      background: #020408;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      max-width: 600px;
      width: 100%;
      background: rgba(8,12,24,0.8);
      border: 1px solid rgba(96,165,250,0.2);
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      backdrop-filter: blur(20px);
    }

    h1 {
      font-family: 'Bungee', sans-serif;
      font-size: 32px;
      margin-bottom: 15px;
      background: linear-gradient(90deg,#60a5fa,#a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .email-btn {
      display: inline-block;
      background: linear-gradient(135deg,#2563eb,#7c3aed);
      color: white;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.3s;
    }

    .email-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(59,130,246,0.4);
    }

    .back {
      display: block;
      margin-top: 20px;
      font-size: 14px;
      color: #60a5fa;
      text-decoration: none;
    }
  </style>

</head>

<body>

  <div class="card">
    <h1>Contact Us</h1>
    <p>Dazzle Games is open to publishing deals, partnerships, and support inquiries.
      Feel free to reach out to us anytime.</p>
    
<a href="mailto:dazzlegamesplay@gmail.com" class="email-btn">
  dazzlegamesplay@gmail.com</a>

<a href="index.html" class="back">← Back to Home</a>

  </div>

</body>
</html>
