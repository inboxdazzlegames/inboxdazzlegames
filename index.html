<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dazzle Games</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

  <style>
    .dazzle-title {
      font-family: 'Bungee', sans-serif;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glowText 2s infinite alternate;
    }

    @keyframes glowText {
      from { text-shadow: 0 0 10px rgba(96,165,250,0.4); }
      to { text-shadow: 0 0 30px rgba(167,139,250,1); }
    }

    .logo-glow {
      animation: pulseGlow 2s infinite alternate;
    }

    @keyframes pulseGlow {
      from { box-shadow: 0 0 20px rgba(59,130,246,0.5); }
      to { box-shadow: 0 0 50px rgba(59,130,246,1); }
    }

    .card-glass {
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-glow:hover {
      box-shadow: 0 0 15px rgba(59,130,246,0.8);
    }
  </style>
</head>

<body class="bg-[#05070d] text-white font-sans overflow-x-hidden">

  <!-- MULTI BACKGROUND GLOW -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-blue-500 opacity-20 blur-[150px]"></div>
  <div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-purple-500 opacity-20 blur-[120px]"></div>

  <!-- HEADER -->
  <section class="text-center py-14 relative z-10">
    <img src="images/Logo1.png"
         class="w-28 h-28 mx-auto mb-4 rounded-full logo-glow transition duration-500 hover:scale-110">

    <h1 class="text-5xl md:text-6xl dazzle-title">Dazzle Games</h1>

    <p class="text-gray-400 mt-3 text-lg">Explore Our Mobile Games</p>
  </section>

  <!-- GAMES GRID -->
  <section class="grid grid-cols-1 sm:grid-cols-2 gap-10 px-6 max-w-5xl mx-auto relative z-10">

    <!-- CARD TEMPLATE -->
    <div class="card-glass p-6 rounded-2xl text-center hover:scale-105 transition duration-300 shadow-xl hover:shadow-blue-500/20">
      <img src="images/game1.png" class="mx-auto rounded-xl mb-4 w-24 h-24 shadow-lg hover:scale-110 transition">
      <h2 class="font-semibold text-lg">Rat Prison Escape</h2>

      <div class="flex justify-center gap-4 mt-4">
        <a href="https://play.google.com/store/apps/details?id=com.kgl.obby.simulator.escape" target="_blank"
           class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg flex items-center gap-2 transition btn-glow">
          <img src="images/android.png" class="w-5 h-5"> Android
        </a>

        <a href="https://apps.apple.com/kw/app/rat-prison-escape-simulator-3d/id6749019062" target="_blank"
           class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-lg flex items-center gap-2 transition">
          <img src="images/ios.png" class="w-5 h-5"> iOS
        </a>
      </div>
    </div>

    <!-- COPY SAME STYLE -->
    <!-- (keep your other 3 cards same as above, just change image + text + links) -->

  </section>

  <!-- CONTACT -->
  <section class="text-center py-20 px-6 relative z-10">
    <h3 class="text-blue-400 tracking-widest">CONTACT</h3>
    <h2 class="text-4xl mt-2 dazzle-title">WORK WITH US</h2>

    <p class="text-gray-400 mt-4 max-w-xl mx-auto">
      We are open to publishing deals, brand partnerships, and licensing opportunities.
    </p>

    <div class="mt-6">
      <a href="mailto:inboxdazzlegames@gmail.com"
         class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-xl inline-block transition shadow-lg btn-glow">
        inboxdazzlegames@gmail.com
      </a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="text-center text-gray-500 pb-6 space-y-2 border-t border-gray-800 pt-6">
    <p>© 2026 Dazzle Games</p>

    <!-- PRIVACY LINK -->
    <a href="privacy.html" class="text-blue-400 hover:text-blue-300 hover:underline transition">
      Privacy Policy
    </a>
  </footer>

</body>
</html>
